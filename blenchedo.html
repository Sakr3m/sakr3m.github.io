<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blenchedo — Il Macroverso</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Spectral:ital,wght@0,400;0,500;1,400&display=swap');

  :root{
    --bg: #0b0c10;
    --bg-soft: #131419;
    --line: #3a2e2e;
    --text: #e8e3d8;
    --text-dim: #9a9186;
    --gold: #b8863f;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: radial-gradient(ellipse at 50% -10%, #1a1512 0%, var(--bg) 60%);
    color: var(--text);
    font-family: 'Spectral', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
  }

  .eyebrow{
    font-family:'Cinzel', serif; letter-spacing: 0.35em; font-size: 0.65rem;
    color: var(--gold); text-transform: uppercase; margin-bottom: 10px;
  }
  h1{
    font-family:'Cinzel', serif; font-weight: 700; font-size: clamp(2.4rem, 6vw, 3.8rem);
    margin: 0 0 80px; background: linear-gradient(180deg, #f0e6d2 0%, #b8863f 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }

  .card{
    width: 168px; height: 168px; border-radius: 6px;
    background: #0e0f13; border: 1px solid #2a2222; overflow: hidden;
    position: relative;
  }
  .card::before{
    content:''; position:absolute; inset:0;
    background: repeating-linear-gradient(115deg, rgba(184,134,63,0.05) 0px, rgba(184,134,63,0.05) 2px, transparent 2px, transparent 6px);
  }
  .sparkle{ position:absolute; border-radius: 50%; background: var(--gold); filter: blur(0.5px); animation: sparkleFlicker 2.6s ease-in-out infinite; }
  @keyframes sparkleFlicker{ 0%, 100% { opacity: 0; transform: scale(0.6); } 50% { opacity: 0.85; transform: scale(1.2); } }
  .shimmer{
    position:absolute; inset: -50% -20%;
    background: linear-gradient(100deg, transparent 30%, rgba(184,134,63,0.12) 45%, rgba(232,227,216,0.18) 50%, rgba(184,134,63,0.12) 55%, transparent 70%);
    animation: shimmerMove 5s linear infinite;
  }
  @keyframes shimmerMove{ 0% { transform: translateX(-40%) translateY(-20%); } 100% { transform: translateX(40%) translateY(20%); } }
</style>
</head>
<body>

  <div class="eyebrow">Il Macroverso</div>
  <h1>BLENCHEDO</h1>

  <div class="card">
    <div class="shimmer"></div>
    <div class="sparkle" style="width:3px;height:3px;top:30%;left:40%;"></div>
    <div class="sparkle" style="width:2px;height:2px;top:60%;left:65%;animation-delay:1s;"></div>
    <div class="sparkle" style="width:4px;height:4px;top:45%;left:20%;animation-delay:1.8s;"></div>
    <div class="sparkle" style="width:3px;height:3px;top:70%;left:35%;animation-delay:2.4s;"></div>
  </div>

</body>
</html>
