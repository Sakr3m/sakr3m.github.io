<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il Macroverso</title>
<meta http-equiv="refresh" content="49;url=blenchedo.html">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:wght@300&family=Spectral:ital,wght@0,400;0,500;1,400&display=swap');

  :root{
    --bg: #0b0c10; --bg-soft: #131419; --line: #3a2e2e;
    --text: #e8e3d8; --text-dim: #9a9186; --gold: #b8863f;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0; min-height: 100vh; background: radial-gradient(ellipse at 50% -10%, #1a1512 0%, var(--bg) 60%);
    color: var(--text); font-family: 'Spectral', serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px;
  }

  .macroverso-title{
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.8rem, 9vw, 5.5rem);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text);
    opacity: 0.92;
    margin: 0 0 60px;
    text-align: center;
  }

  .redirect-note{
    font-size: 0.9rem; color: var(--text-dim); font-style: italic; margin-bottom: 30px; text-align: center; max-width: 380px;
  }
  .redirect-note .target{ color: var(--gold); font-style: normal; }

  .go-link{
    font-family: 'Cinzel', serif; font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gold); text-decoration: none; border: 1px solid var(--line); border-radius: 30px;
    padding: 16px 42px; transition: border-color 0.3s ease, box-shadow 0.3s ease;
    min-width: 220px; text-align: center; display: inline-block;
  }
  .go-link:hover{ border-color: var(--gold); box-shadow: 0 0 20px rgba(184,134,63,0.25); }
</style>
</head>
<body>

  <p class="macroverso-title">Macroverso</p>

  <p class="redirect-note">Tra <span id="countdown">49</span> secondi ti porto dentro <span class="target">Blenchedo</span>.</p>

  <a class="go-link" href="blenchedo.html">Blenchedo</a>

<script>
  let seconds = 49;
  const countdownEl = document.getElementById('countdown');
  const interval = setInterval(() => {
    seconds--;
    if(seconds <= 0){
      clearInterval(interval);
    } else {
      countdownEl.textContent = seconds;
    }
  }, 1000);
</script>

</body>
</html>
